<html>
  <head>
    <title>Torus and toroids</title>
    <meta charset="utf-8">
	<link rel="icon" type="image/png" href="salas/imagens/icone.png">
	<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
	<script src="https://unpkg.com/aframe-orbit-controls@1.3.0/dist/aframe-orbit-controls.min.js"></script>
	<link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet">
	<script src="nomes.js"></script>
	<link rel="stylesheet" href="nomes.css">
 	<script src="https://unpkg.com/aframe-teleport-controls@0.3.x/dist/aframe-teleport-controls.min.js"></script>
  </head>
  <body>
<div style='color:#fada99; position: fixed; bottom: 1vh; left:1vw; width:100%; z-index: 1; font-family: Lato; font-size:2.5vh; font-weight:bold; text-shadow:1px 1px 1px royalblue;'>paulohscwb@gmail.com <br> &copy; 2026 Paulo Henrique Siqueira</div>
    <a-scene renderer="logarithmicDepthBuffer: true; colorManagement: true;">
		<a-assets>
			<a-mixin id="mtl9" material="color: #8ec; side:double;"></a-mixin>
			<a-mixin id="esfera" mixin="mtl9" geometry="radius: 0.1062; segments-height:20; segments-width:20;" material="metalness:0.4; roughness:0.5;"></a-mixin></a-mixin>
			<a-asset-item id="material" src="https://paulohscwb.github.io/polyhedra2/fractalnonconvex/vr/outros/c1.mtl"></a-asset-item>
			<a-asset-item id="poli" src="https://paulohscwb.github.io/polyhedra/nonconvex/vr/outros/Octahemioctahedron.obj"></a-asset-item>
			<a-asset-item id="poliw" src="https://paulohscwb.github.io/polyhedra/nonconvex/vr/outros/OctahemioctahedronL.obj"></a-asset-item>
			<a-mixin id="fc" scale="1.409 1.409 1.409" obj-model="obj: #poli; mtl: #material"></a-mixin>
			<a-mixin id="ar" scale="1.4095 1.4095 1.4095" obj-model="obj: #poliw; mtl: #material"></a-mixin>
		</a-assets>
		
		<a-entity position="0 0 -2" scale="1.5 1.5 1.5">
			<a-light type="point" color="white" intensity="0.5" position="0 0 0"></a-light>
			<a-entity mixin="fc" position='0 2.655 -1.33'></a-entity>
			<a-entity mixin="fc" position='1.33 1.33 0' rotation="-19.5 45 -45"></a-entity>
			<a-entity mixin="fc" position='2.665 0 1.33'></a-entity>
			<a-entity mixin="fc" position='1.33 -1.33 0' rotation="19.5 45 45"></a-entity>
			<a-entity mixin="fc" position='0 -2.655 -1.33'></a-entity>
			<a-entity mixin="fc" position='-1.33 -1.33 0' rotation="19.5 -45 -45"></a-entity>
			<a-entity mixin="fc" position='-2.665 0 1.33'></a-entity>
			<a-entity mixin="fc" position='-1.33 1.33 0' rotation="-19.5 -45 45"></a-entity>
			<a-entity mixin="ar" position='0 2.655 -1.33'></a-entity>
			<a-entity mixin="ar" position='1.33 1.33 0' rotation="-19.5 45 -45"></a-entity>
			<a-entity mixin="ar" position='2.665 0 1.33'></a-entity>
			<a-entity mixin="ar" position='1.33 -1.33 0' rotation="19.5 45 45"></a-entity>
			<a-entity mixin="ar" position='0 -2.655 -1.33'></a-entity>
			<a-entity mixin="ar" position='-1.33 -1.33 0' rotation="19.5 -45 -45"></a-entity>
			<a-entity mixin="ar" position='-2.665 0 1.33'></a-entity>
			<a-entity mixin="ar" position='-1.33 1.33 0' rotation="-19.5 -45 45"></a-entity>
			<a-entity rotation="0 180 0" position="0 0 2.666">
				<a-entity mixin="fc" position='0 2.655 -1.33'></a-entity>
				<a-entity mixin="fc" position='1.33 1.33 0' rotation="-19.5 45 -45"></a-entity>
				<a-entity mixin="fc" position='1.33 -1.33 0' rotation="19.5 45 45"></a-entity>
				<a-entity mixin="fc" position='0 -2.655 -1.33'></a-entity>
				<a-entity mixin="fc" position='-1.33 -1.33 0' rotation="19.5 -45 -45"></a-entity>
				<a-entity mixin="fc" position='-1.33 1.33 0' rotation="-19.5 -45 45"></a-entity>
				<a-entity mixin="ar" position='0 2.655 -1.33'></a-entity>
				<a-entity mixin="ar" position='1.33 1.33 0' rotation="-19.5 45 -45"></a-entity>
				<a-entity mixin="ar" position='1.33 -1.33 0' rotation="19.5 45 45"></a-entity>
				<a-entity mixin="ar" position='0 -2.655 -1.33'></a-entity>
				<a-entity mixin="ar" position='-1.33 -1.33 0' rotation="19.5 -45 -45"></a-entity>
				<a-entity mixin="ar" position='-1.33 1.33 0' rotation="-19.5 -45 45"></a-entity>
			</a-entity>
		</a-entity>
		
		<a-box mixin="piso" class="piso" visible="false" position="0 -1.5 0"></a-box>
		<a-entity id="cameraRig" position="0 0 11">
			<a-entity camera="fov:1; near:0.001;" id="head" orbit-controls="target: 0 0 0; maxPolarAngle: 180; minDistance: 0.5; initialPosition: 0 0 750; maxDistance: 1500;"></a-entity>
			<a-entity teleport-controls="cameraRig: #cameraRig; collisionEntities: [mixin='piso']; teleportOrigin: #head; button: grip;" hand-controls="hand: right"></a-entity>
		</a-entity>
	  
		<a-light type="ambient" color="white" intensity="0.5"></a-light>
		<a-light type="directional" color="white" intensity="0.8" position="-3 2 1"></a-light>
		<a-light type="directional" color="white" intensity="0.8" position="3 -2 1"></a-light>

		<a-sky color="azure"></a-sky>
    </a-scene>
	<div class="box">
		<span class="titulo">Stewart's rings of octahemioctahedrons</span>
		<br><span class="titulo">Anéis de octahemioctaedros de Stewart</span>
		<hr><input type="checkbox" id="faces" checked onclick="mfaces()">faces&nbsp;&nbsp;&nbsp;  
		<input type="checkbox" id="arestas" checked onclick="marestas()">edges
	</div>
  </body>
</html>
